<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIA-CHENG CHUEH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #1e0533, #0b051f, #2a0b4d, #14052e);
            background-size: 400% 400%;
            animation: bgAnimation 15s ease infinite;
            color: var(--text-main);
        }

        @keyframes bgAnimation {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(147, 51, 234, 0.4);
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(79, 70, 229, 0.3);
            bottom: -150px;
            right: -100px;
            animation-duration: 22s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 450px;
            height: 450px;
            background: rgba(236, 72, 153, 0.15);
            top: 20%;
            left: 30%;
            animation-duration: 28s;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(50px, 50px) scale(1.1);
            }

            100% {
                transform: translate(-30px, 80px) scale(0.9);
            }
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        .card-wrapper {
            opacity: 0;
            transform: translateY(40px);
            animation: cardFadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes cardFadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 70px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            width: 100%;
            max-width: 550px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6), 0 0 30px rgba(147, 51, 234, 0.2);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #a855f7 0%, #d8b4fe 30%, #c084fc 50%, #d8b4fe 70%, #a855f7 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            letter-spacing: -0.05em;
        }

        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }

        .date {
            font-weight: 500;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .clock {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 4rem;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .stagger-1 {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.3s;
        }

        .stagger-2 {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.5s;
        }

        .stagger-3 {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.7s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .clock {
                font-size: 3rem;
            }

            .date {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="container">
        <div class="card-wrapper">
            <div class="card">
                <h1 class="stagger-1">CHIA-CHENG CHUEH</h1>
                <div class="date stagger-2" id="date"></div>
                <div class="clock stagger-3" id="clock"></div>
            </div>
        </div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m + ':' + s;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>

</html>
